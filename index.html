:root {
  /* Hauptfarben – hier anpassen! */
  --sage: #7A8E6E;
  --sage-light: #95A888;
  --sage-pale: #B5C4AB;
  --sage-muted: #C8D4BF;
  --cream: #F6F2EC;
  --cream-warm: #EDE7DD;
  --cream-dark: #DDD5C8;
  --linen: #FAF8F5;
  --bark: #3E3832;
  --bark-light: #5D554E;
  --bark-muted: #7A726B;
  --terracotta: #B87A5A;
  --terracotta-light: #D4A07C;
  --moss: #5C6E52;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Karla', system-ui, -apple-system, sans-serif;
  background: var(--linen);
  color: var(--bark);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

::selection {
  background: var(--sage-muted);
  color: var(--bark);
}

/* ─── GRAIN TEXTURE OVERLAY ─── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* ─── TYPOGRAPHY ─── */
h1, h2, h3, h4 {
  font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
  font-weight: 500;
  letter-spacing: -0.01em;
}

/* ─── NAV ─── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 5vw;
  background: rgba(246,242,236,0.88);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  transition: all 0.4s ease;
}
nav.scrolled {
  padding: 0.8rem 5vw;
  box-shadow: 0 1px 0 rgba(122,142,110,0.12);
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 600;
  color: var(--bark);
  letter-spacing: 0.06em;
  text-transform: lowercase;
}
.logo-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--sage);
  border-radius: 50%;
  margin-left: 2px;
  vertical-align: middle;
  transform: translateY(-2px);
}

.nav-links {
  display: flex; gap: 2.2rem;
  list-style: none;
}
.nav-links a {
  text-decoration: none;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--bark-muted);
  transition: color 0.3s;
}
.nav-links a:hover { color: var(--sage); }

.hamburger {
  display: none;
  background: none; border: none; cursor: pointer;
  width: 28px; height: 20px;
  position: relative;
}
.hamburger span {
  position: absolute; left: 0;
  width: 100%; height: 1.5px;
  background: var(--bark);
  transition: all 0.3s;
}
.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { top: 50%; transform: translateY(-50%); }
.hamburger span:nth-child(3) { bottom: 0; }

/* ─── HERO ─── */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: 0 5vw;
  gap: 4rem;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -20%; right: -10%;
  width: 70vw; height: 70vw;
  border-radius: 50%;
  background: radial-gradient(circle, var(--sage-muted) 0%, transparent 70%);
  opacity: 0.15;
  pointer-events: none;
}

.hero-text {
  padding-top: 2rem;
  max-width: 560px;
  animation: slideUp 0.9s ease-out;
}

.hero-label {
  display: inline-flex; align-items: center; gap: 0.6rem;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--sage);
  margin-bottom: 1.8rem;
}
.hero-label::before {
  content: '';
  width: 28px; height: 1.5px;
  background: var(--sage-pale);
}

.hero h1 {
  font-size: clamp(3rem, 5.5vw, 4.8rem);
  line-height: 1.08;
  color: var(--bark);
  margin-bottom: 1.4rem;
}
.hero h1 .accent {
  color: var(--sage);
  font-style: italic;
  font-weight: 400;
}

.hero-desc {
  font-size: 1.08rem;
  line-height: 1.75;
  color: var(--bark-muted);
  max-width: 420px;
  margin-bottom: 2.2rem;
}

.hero-actions { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }

.btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.85rem 1.8rem;
  font-family: 'Karla', sans-serif;
  font-size: 0.88rem; font-weight: 600;
  letter-spacing: 0.04em;
  text-decoration: none;
  border: none; cursor: pointer;
  transition: all 0.35s ease;
}
.btn-primary {
  background: var(--sage);
  color: #fff;
  border-radius: 4px;
  box-shadow: 0 2px 12px rgba(122,142,110,0.25);
}
.btn-primary:hover {
  background: var(--moss);
  box-shadow: 0 4px 20px rgba(122,142,110,0.35);
  transform: translateY(-1px);
}
.btn-ghost {
  background: none;
  color: var(--bark-light);
  padding: 0.85rem 0.5rem;
  border-bottom: 1.5px solid var(--cream-dark);
}
.btn-ghost:hover {
  color: var(--sage);
  border-color: var(--sage-pale);
}

/* Hero visual */
.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
  padding-top: 2rem;
  animation: fadeIn 1.2s ease-out 0.3s both;
}

.hero-organic {
  width: 440px; height: 530px;
  position: relative;
}

.organic-shape {
  position: absolute;
  border-radius: 50%;
}
.organic-shape-1 {
  width: 320px; height: 380px;
  top: 20px; left: 30px;
  background: linear-gradient(160deg, var(--sage-pale) 0%, var(--sage) 60%, var(--moss) 100%);
  border-radius: 52% 48% 43% 57% / 55% 45% 55% 45%;
  animation: organicFloat 10s ease-in-out infinite;
  box-shadow:
    inset -15px -20px 40px rgba(92,110,82,0.25),
    inset 10px 15px 30px rgba(181,196,171,0.3),
    0 20px 50px rgba(122,142,110,0.15);
}
.organic-shape-2 {
  width: 160px; height: 180px;
  bottom: 0; left: 0;
  background: linear-gradient(135deg, var(--cream-warm) 0%, var(--terracotta-light) 100%);
  border-radius: 48% 52% 55% 45% / 50% 55% 45% 50%;
  animation: organicFloat 8s ease-in-out infinite reverse;
  opacity: 0.7;
  box-shadow: 0 10px 30px rgba(184,122,90,0.12);
}
.organic-shape-3 {
  width: 90px; height: 90px;
  top: 0; right: 20px;
  background: var(--cream-dark);
  border-radius: 45% 55% 50% 50% / 55% 45% 50% 50%;
  animation: organicFloat 7s ease-in-out infinite 1s;
  opacity: 0.5;
}

.hero-emoji {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 5rem;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.1));
  z-index: 2;
}

@keyframes organicFloat {
  0%, 100% { border-radius: 52% 48% 43% 57% / 55% 45% 55% 45%; transform: translate(0, 0); }
  33% { border-radius: 48% 52% 50% 50% / 45% 55% 50% 50%; transform: translate(-5px, 8px); }
  66% { border-radius: 55% 45% 48% 52% / 50% 50% 55% 45%; transform: translate(5px, -5px); }
}

/* ─── SECTION SHARED ─── */
section {
  padding: 7rem 5vw;
}

.section-intro {
  max-width: 560px;
  margin-bottom: 4rem;
}
.section-intro.centered {
  text-align: center;
  margin-left: auto; margin-right: auto;
}

.section-label {
  display: inline-flex; align-items: center; gap: 0.6rem;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--sage);
  margin-bottom: 1rem;
}
.section-label::before {
  content: '';
  width: 20px; height: 1.5px;
  background: var(--sage-pale);
}

.section-intro h2 {
  font-size: clamp(2rem, 3.5vw, 2.8rem);
  line-height: 1.15;
  color: var(--bark);
  margin-bottom: 1rem;
}

.section-intro p {
  font-size: 1rem;
  line-height: 1.7;
  color: var(--bark-muted);
}

/* ─── ÜBER UNS ─── */
#ueber {
  background: var(--cream);
}

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 5rem;
  max-width: 1060px;
  margin: 0 auto;
  align-items: center;
}

.about-visual {
  position: relative;
  height: 400px;
}
.about-blob {
  width: 100%; height: 100%;
  background: linear-gradient(145deg, var(--sage-muted), var(--sage-pale));
  border-radius: 60% 40% 50% 50% / 50% 60% 40% 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 5rem;
  box-shadow: 0 20px 50px rgba(122,142,110,0.12);
}

.about-text blockquote {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-style: italic;
  line-height: 1.5;
  color: var(--bark-light);
  border-left: 2px solid var(--sage-pale);
  padding-left: 1.5rem;
  margin-bottom: 1.5rem;
}

.about-text p {
  font-size: 0.95rem;
  line-height: 1.8;
  color: var(--bark-muted);
  margin-bottom: 1rem;
}

/* ─── ANGEBOTE CARDS ─── */
#angebote { background: var(--linen); }

.offer-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
  max-width: 1060px;
  margin: 0 auto;
}

.offer-card {
  background: var(--cream);
  border: 1px solid rgba(122,142,110,0.08);
  border-radius: 12px;
  padding: 2.5rem 2rem;
  position: relative;
  transition: all 0.4s ease;
  overflow: hidden;
}
.offer-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--sage-pale), var(--sage));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s ease;
}
.offer-card:hover::before { transform: scaleX(1); }
.offer-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(62,56,50,0.07);
}

.offer-emoji {
  font-size: 2rem;
  margin-bottom: 1.2rem;
  display: block;
}
.offer-icon {
  width: 56px;
  height: 56px;
  object-fit: contain;
  margin-bottom: 1.2rem;
  display: block;
}

.offer-card h3 {
  font-size: 1.4rem;
  margin-bottom: 0.7rem;
  color: var(--bark);
}
.offer-card p {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--bark-muted);
  margin-bottom: 1.2rem;
}

.card-link {
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--sage);
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  transition: gap 0.3s;
}
.card-link:hover { gap: 0.8rem; }

/* ─── KURSE ─── */
#kurse { background: var(--cream); }

.kurs-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
  max-width: 1060px;
  margin: 0 auto;
}

.kurs-item {
  background: var(--linen);
  border-radius: 10px;
  padding: 2rem;
  border: 1px solid transparent;
  transition: all 0.35s ease;
}
.kurs-item:hover {
  border-color: var(--sage-pale);
  box-shadow: 0 8px 28px rgba(62,56,50,0.06);
}

.kurs-tags {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  margin-bottom: 1rem;
}
.tag {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0.3rem 0.65rem;
  border-radius: 3px;
}
.tag-level { background: rgba(122,142,110,0.14); color: var(--sage); }
.tag-advanced { background: rgba(184,122,90,0.12); color: var(--terracotta); }
.tag-kinder { background: rgba(100,160,200,0.13); color: #4a90b8; }
.tag-date { background: rgba(62,56,50,0.06); color: var(--bark-muted); }

.kurs-item h3 {
  font-size: 1.25rem;
  margin-bottom: 0.5rem;
  color: var(--bark);
}
.kurs-item > p {
  font-size: 0.88rem;
  line-height: 1.65;
  color: var(--bark-muted);
}
.kurs-price {
  margin-top: 1.2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--cream-dark);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--moss);
}
.kurs-price small {
  font-size: 0.8rem;
  font-weight: 400;
  color: var(--bark-muted);
}
.kurs-item-klickbar {
  cursor: pointer;
}
.kurs-item-klickbar:hover {
  border-color: var(--sage) !important;
  transform: translateY(-2px);
}
.kurs-item-voll {
  opacity: 0.55;
  cursor: default;
  filter: grayscale(0.3);
}
.kurs-item-voll:hover {
  transform: none !important;
  border-color: var(--cream-dark) !important;
}
.kurs-footer {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--cream-dark);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.kurs-verfuegbar {
  font-size: 0.78rem;
  font-weight: 600;
}
.kurs-verfuegbar-frei { color: var(--sage); }
.kurs-verfuegbar-voll { color: var(--bark-muted); }
.kurs-cta-link {
  font-size: 0.85rem;
  color: var(--sage);
  font-weight: 600;
}
.kal-filter-badge {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: rgba(122,142,110,0.12);
  border: 1px solid var(--sage-pale);
  border-radius: 20px;
  padding: 0.35rem 0.9rem;
  font-size: 0.82rem;
  color: var(--moss);
  font-weight: 600;
  margin-bottom: 0.8rem;
}
.kal-filter-badge button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 1rem;
  color: var(--bark-muted);
  line-height: 1;
  padding: 0 0.1rem;
}

/* ─── GALERIE ─── */
#galerie { background: var(--linen); }

.gallery-masonry {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 180px;
  gap: 0.8rem;
  max-width: 1060px;
  margin: 0 auto;
}

.gallery-cell {
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  transition: transform 0.35s, box-shadow 0.35s;
}
.gallery-cell:hover {
  transform: scale(1.02);
  box-shadow: 0 12px 30px rgba(62,56,50,0.1);
  z-index: 2;
}

.gallery-cell:nth-child(1) { grid-column: span 2; grid-row: span 2; font-size: 4rem; background: linear-gradient(150deg, var(--sage-pale), var(--sage)); }
.gallery-cell:nth-child(2) { background: linear-gradient(135deg, var(--cream-warm), var(--terracotta-light)); }
.gallery-cell:nth-child(3) { background: linear-gradient(135deg, var(--sage-muted), var(--sage-pale)); }
.gallery-cell:nth-child(4) { grid-row: span 2; background: linear-gradient(180deg, var(--cream-dark), var(--sage-pale)); font-size: 3rem; }
.gallery-cell:nth-child(5) { background: linear-gradient(135deg, var(--terracotta-light), var(--terracotta)); }
.gallery-cell:nth-child(6) { background: linear-gradient(135deg, var(--sage), var(--moss)); }

.gallery-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 1rem;
  background: linear-gradient(transparent, rgba(62,56,50,0.6));
  color: #fff;
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  opacity: 0;
  transform: translateY(4px);
  transition: all 0.3s;
}
.gallery-cell:hover .gallery-label {
  opacity: 1;
  transform: translateY(0);
}

.gallery-hint {
  text-align: center;
  margin-top: 2rem;
  font-size: 0.85rem;
  color: var(--bark-muted);
  font-style: italic;
}

/* ─── VERLEIH ─── */
#verleih { background: var(--cream); }

.rental-card {
  max-width: 860px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 3rem;
  align-items: center;
  background: var(--linen);
  border-radius: 14px;
  padding: 3rem;
  border: 1px solid rgba(122,142,110,0.1);
}

.rental-visual {
  width: 150px; height: 150px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--sage-muted), var(--sage));
  display: flex; align-items: center; justify-content: center;
  font-size: 3.5rem;
  box-shadow:
    0 12px 32px rgba(122,142,110,0.18),
    inset 0 -4px 12px rgba(92,110,82,0.15);
  flex-shrink: 0;
}

.rental-body h3 {
  font-size: 1.6rem;
  margin-bottom: 0.6rem;
}
.rental-body > p {
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--bark-muted);
  margin-bottom: 1.5rem;
}

.rental-pricing {
  display: flex; gap: 2rem; flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.rental-price-item {
  display: flex; flex-direction: column;
}
.rental-price-item .amount {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--moss);
}
.rental-price-item .period {
  font-size: 0.78rem;
  color: var(--bark-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.rental-perks {
  display: flex; gap: 1.5rem; flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.perk {
  font-size: 0.85rem;
  color: var(--bark-light);
  display: flex; align-items: center; gap: 0.4rem;
}
.perk::before {
  content: '✓';
  color: var(--sage);
  font-weight: 700;
}

/* ─── ETSY SHOP ─── */
#shop { background: var(--cream); }
.etsy-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.5rem;
}
.etsy-card {
  text-decoration: none;
  color: inherit;
  border-radius: 12px;
  overflow: hidden;
  background: #fff;
  box-shadow: 0 2px 12px rgba(62,56,50,0.06);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  display: block;
}
.etsy-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 24px rgba(62,56,50,0.12);
}
.etsy-card-img {
  aspect-ratio: 1;
  overflow: hidden;
  background: var(--cream-dark);
}
.etsy-card-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.35s ease;
}
.etsy-card:hover .etsy-card-img img { transform: scale(1.04); }
.etsy-card-img-placeholder {
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem; aspect-ratio: 1;
}
.etsy-card-body { padding: 0.9rem 1rem; }
.etsy-card-name {
  font-size: 0.88rem;
  color: var(--bark);
  line-height: 1.4;
  margin-bottom: 0.4rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.etsy-card-price {

function cookieBannerVerstecken() {

function renderEtsyShop() {
  const shopUrl = 'https://www.etsy.com/de/shop/ELIMENTE';
  if (!_etsyDaten.length) {
    return `<div style="text-align:center;padding:1rem 0">
      <p style="color:var(--bark-muted);margin-bottom:1.5rem">Besuche meinen Etsy Shop für alle aktuellen Stücke.</p>
      <a href="${shopUrl}" target="_blank" rel="noopener" class="btn btn-primary">Zum Etsy Shop →</a>
    </div>`;
  }
  const karten = _etsyDaten.slice(0, 8).map(p => {
    const img   = p.Images?.[0]?.url_570xN || '';
    const preis = p.price
      ? (p.price.amount / p.price.divisor).toFixed(2).replace('.', ',') + '\u00a0' + p.price.currency_code
      : '';
    return `
      <a href="${p.url}" target="_blank" rel="noopener" class="etsy-card">
        ${img
          ? `<div class="etsy-card-img"><img src="${img}" alt="${p.title}" loading="lazy"></div>`
          : `<div class="etsy-card-img etsy-card-img-placeholder">🏺</div>`}
        <div class="etsy-card-body">
          <div class="etsy-card-name">${p.title}</div>
          ${preis ? `<div class="etsy-card-price">${preis}</div>` : ''}
        </div>
      </a>`;
  }).join('');
  return `
    <div class="etsy-grid">${karten}</div>
    <div style="text-align:center;margin-top:2.5rem">
      <a href="${shopUrl}" target="_blank" rel="noopener" class="btn btn-primary">Alle Artikel im Shop →</a>
    </div>`;
}

function initScrollEffects() {
  // Nav scroll
  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  });

  // Reveal on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal').forEach((el, i) => {
    el.style.transitionDelay = `${(i % 4) * 0.08}s`;
    observer.observe(el);
  });

  // Close mobile nav on link click
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.addEventListener('click', () => {
      document.getElementById('mainNav').classList.remove('mobile-open');
    });
  });
}

// Zustand
let _sb              = null;
let _modus           = 'kurse';

let _kurstypen       = [];
let _filterKurstyp   = null; // null = alle, oder kurstyp-ID
let _termine         = [];
let _verleihBuchungen= [];
// Etsy-Produkte: beim Deploy durch GitHub Actions injiziert (build-time)
let _etsyDaten = ("ETSY_LISTINGS_PLACEHOLDER".results || []);
let _selDatum        = null;
let _selTermin       = null;
let _verleihStart    = null;
let _verleihEnde     = null;
let _kalMonat        = new Date(); _kalMonat.setDate(1);

// ─── Seite initialisieren ──────────────────────────────────
// Texte aus Supabase laden → siteData überschreiben → rendern
(async function init() {
  const cfg = siteData.supabase;
  if (cfg && cfg.url && !cfg.url.startsWith('DEINE')) {
    _sb = window.supabase.createClient(cfg.url, cfg.anonKey);
    await Promise.all([ladeSiteTexte(), ladeBilder(), ladeAktiveKurstypen(), ladeKursTermine()]); // Texte, Fotos, Kurstypen & Termine laden
  }

  renderSite(siteData); // Mit ggf. aktualisierten Texten rendern

  if (_sb) {
    ladeUndRenderKalender();
  } else {
    const el = document.getElementById('kurs-kalender');
    if (el) el.innerHTML = '<p style="text-align:center;padding:2rem;color:var(--bark-muted);font-style:italic">Kalender wird nach der Supabase-Einrichtung aktiv.</p>';
  }
})();

// Bilder aus Supabase laden
async function ladeBilder() {
  const { data } = await _sb.from('galerie_bilder').select('*').eq('aktiv', true).order('sort_order');
  if (!data) return;
  _bilder.hero             = data.find(b => b.bereich === 'hero')         || null;
  _bilder.about            = data.find(b => b.bereich === 'about')        || null;
  _bilder.galerie          = data.filter(b => b.bereich === 'galerie');
  _bilder.icons.kaufen     = data.find(b => b.bereich === 'icon_kaufen')  || null;
  _bilder.icons.kurse      = data.find(b => b.bereich === 'icon_kurse')   || null;
  _bilder.icons.verleih    = data.find(b => b.bereich === 'icon_verleih') || null;
}

// Texte aus Supabase laden und in siteData einsetzen
async function ladeSiteTexte() {
  const { data, error } = await _sb.from('site_texte').select('key, wert');
  if (error || !data) return;

  data.forEach(({ key, wert }) => {
    // 'hero.label' → siteData.hero.label = wert
    const teile = key.split('.');
    let obj = siteData;
    for (let i = 0; i < teile.length - 1; i++) {
      if (obj[teile[i]] === undefined) return;
      obj = obj[teile[i]];
    }
    const letzterKey = teile[teile.length - 1];
    if (letzterKey in obj) obj[letzterKey] = wert;
  });
}

// Alle Daten laden und Kalender rendern
async function ladeUndRenderKalender() {
  const el = document.getElementById('kurs-kalender');
  if (!el || !_sb) return;

  await Promise.all([ladeKursTermine(), ladeVerleihBuchungen()]);
  renderKalender();
}

async function ladeAktiveKurstypen() {
  const { data } = await _sb.from('kurs_typen').select('*').eq('aktiv', true).order('sort_order');
  _kurstypen = data || [];
}

async function ladeKursTermine() {
  const heute = new Date().toISOString().split('T')[0];
  const { data, error } = await _sb
    .from('kurs_termine')
    .select('*, kurs_typen(*)')
    .gte('datum', heute)
    .neq('status', 'abgesagt')
    .order('datum');
  if (!error) _termine = data || [];
}

async function ladeVerleihBuchungen() {
  const heute = new Date().toISOString().split('T')[0];
  const { data, error } = await _sb
    .from('verleih_buchungen')
    .select('start_datum, end_datum')
    .neq('status', 'storniert')
    .gte('end_datum', heute);
  if (!error) _verleihBuchungen = data || [];
}

// ─── Kalender-Grid rendern ──────────────────────────────────
function renderKalender() {
  const el = document.getElementById('kurs-kalender');
  if (!el) return;

  const MONATE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const TAGE   = ['Mo','Di','Mi','Do','Fr','Sa','So'];

  const year  = _kalMonat.getFullYear();
  const month = _kalMonat.getMonth();

  // Wochentag des ersten Monatstags (Mo=0 … So=6)
  let ersterTag = new Date(year, month, 1).getDay();
  ersterTag = ersterTag === 0 ? 6 : ersterTag - 1;

  const tageImMonat = new Date(year, month + 1, 0).getDate();
  const heute = new Date(); heute.setHours(0, 0, 0, 0);

  // Termine nach Tag gruppieren (ggf. nach Kurstyp filtern)
  const tagMap = {};
  const termineGefiltert = _filterKurstyp
    ? _termine.filter(t => t.kurs_typen?.id === _filterKurstyp)
    : _termine;
  termineGefiltert.forEach(t => {
    const [ty, tm, td] = t.datum.split('-').map(Number);
    if (ty === year && tm - 1 === month) {
      (tagMap[td] = tagMap[td] || []).push(t);
    }
  });

  // Zellen generieren (je nach Modus unterschiedlich)
  let cells = Array(ersterTag).fill('<div class="kal-cell kal-leer"></div>').join('');

  for (let tag = 1; tag <= tageImMonat; tag++) {
    const datum    = `${year}-${String(month + 1).padStart(2, '0')}-${String(tag).padStart(2, '0')}`;
    const datumObj = new Date(year, month, tag);
    const istHeute    = datumObj.getTime() === heute.getTime();
    const istVergangen= datumObj < heute;

    if (_modus === 'kurse') {
      const termine  = tagMap[tag] || [];
      const hatFreie = termine.some(t => t.status === 'offen');
      const istSelected = datum === _selDatum;

      let cls = 'kal-cell';
      if (istHeute)     cls += ' kal-heute';
      if (istVergangen) cls += ' kal-vergangen';
      if (termine.length && !istVergangen) cls += hatFreie ? ' kal-frei' : ' kal-voll';
      if (istSelected)  cls += ' kal-selected';

      const punkte = termine.length && !istVergangen
        ? termine.map(t => `<span class="kal-punkt${t.status === 'voll' ? ' kal-punkt-voll' : ''}"></span>`).join('')
        : '';
      const klick = hatFreie && !istVergangen ? `onclick="kalWaehleTag('${datum}')"` : '';
      cells += `<div class="${cls}" ${klick}><span class="kal-tagzahl">${tag}</span><div class="kal-punkte">${punkte}</div></div>`;

    } else {
      // Verleih-Modus
      const istGebucht = _verleihBuchungen.some(b => datum >= b.start_datum && datum <= b.end_datum);
      const istStart   = datum === _verleihStart;
      const istEnde    = datum === _verleihEnde;
      const istRange   = _verleihStart && _verleihEnde && datum > _verleihStart && datum < _verleihEnde;

      // Zu früh = weniger als 14 Tage nach Start (wenn Start gewählt aber noch kein Ende)
      const minEnde = _verleihStart && !_verleihEnde
        ? new Date(new Date(_verleihStart + 'T00:00:00').getTime() + 14 * 86400000).toISOString().split('T')[0]
        : null;
      const istZuFrueh = minEnde && datum > _verleihStart && datum < minEnde;

      let cls = 'kal-cell';
      if (istHeute)    cls += ' kal-heute';
      if (istVergangen) cls += ' kal-vergangen';
      else if (istGebucht)  cls += ' kal-verleih-gebucht';
      else if (istStart)    cls += ' kal-verleih-start';
      else if (istEnde)     cls += ' kal-verleih-ende';
      else if (istRange)    cls += ' kal-verleih-range';
      else if (istZuFrueh)  cls += ' kal-verleih-zu-frueh';
      else if (!istVergangen) cls += ' kal-verleih-frei';

      const klickbar = !istVergangen && !istGebucht && !istZuFrueh;
      const klick = klickbar ? `onclick="verleihKlick('${datum}')"` : '';
      cells += `<div class="${cls}" ${klick}><span class="kal-tagzahl">${tag}</span></div>`;
    }
  }

  // Legende je nach Modus
  const legende = _modus === 'kurse'
    ? `<span><span class="kal-punkt"></span> Plätze frei</span>
       <span><span class="kal-punkt kal-punkt-voll"></span> Ausgebucht</span>`
    : `<span style="display:flex;align-items:center;gap:0.4rem"><span style="width:10px;height:10px;background:rgba(122,142,110,0.15);border-radius:2px;display:inline-block"></span> Belegt</span>
       <span style="display:flex;align-items:center;gap:0.4rem"><span style="width:10px;height:10px;background:rgba(122,142,110,0.25);border-radius:2px;display:inline-block"></span> Frei</span>`;

  // Panel je nach Modus
  const panelInhalt = _modus === 'kurse'
    ? (_selDatum ? kalBuchungsPanel() : kalPlatzhalter())
    : verleihPanel();

  const filterBadge = _filterKurstyp
    ? (() => {
        const kt = _kurstypen.find(k => k.id === _filterKurstyp);
        return kt ? `<div class="kal-filter-badge">${kt.name} <button onclick="clearKursFilter()" title="Filter aufheben">×</button></div>` : '';
      })()
    : '';

  el.innerHTML = `
    <div class="kal-layout">
      <div>
        ${filterBadge}
        <div class="kal-nav">
          <button class="kal-nav-btn" onclick="kalNavMonat(-1)">◀</button>
          <span class="kal-monatstitel">${MONATE[month]} ${year}</span>
          <button class="kal-nav-btn" onclick="kalNavMonat(1)">▶</button>
        </div>
        <div class="kal-raster">
          ${TAGE.map(t => `<div class="kal-wochentag">${t}</div>`).join('')}
          ${cells}
        </div>
        <div class="kal-legende">${legende}</div>
      </div>
      <div class="kal-panel" id="kal-panel">${panelInhalt}</div>
    </div>
  `;
}

// ─── Hilfsfunktionen ───────────────────────────────────────

function kalNavMonat(dir) {
  _kalMonat.setMonth(_kalMonat.getMonth() + dir);
  renderKalender();
}

function kalWaehleTag(datum) {
  _selDatum  = datum;
  _selTermin = null;
  renderKalender();
}

function kalWaehleTermin(terminId) {
  _selTermin = _termine.find(t => t.id === terminId) || null;
  // Nur Panel neu rendern, nicht den ganzen Kalender
  const panel = document.getElementById('kal-panel');
  if (panel) panel.innerHTML = kalBuchungsPanel();
}

// ─── Panel-Inhalte ─────────────────────────────────────────

function kalPlatzhalter() {
  return `
    <div class="kal-platzhalter">
      <div class="kal-platzhalter-icon">📅</div>
      <p>Wähle einen <strong>grün markierten Tag</strong>, um einen Termin zu buchen.</p>
    </div>`;
}

function kalBuchungsPanel() {
  const termine = _termine.filter(t => t.datum === _selDatum && t.status === 'offen');
  const datumStr = new Date(_selDatum + 'T00:00:00')
    .toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });

  return `
    <div>
      <div class="kal-panel-datum">${datumStr}</div>
      ${termine.map(t => `
        <div class="kal-termin-karte${_selTermin?.id === t.id ? ' ist-aktiv' : ''}"
             onclick="kalWaehleTermin('${t.id}')">
          <div class="kal-termin-name">${t.kurs_typen.name}</div>
          <div class="kal-termin-meta">🕐 ${t.uhrzeit_start.slice(0, 5)} Uhr &nbsp;·&nbsp; ⏱ ${t.kurs_typen.duration} &nbsp;·&nbsp; 💰 ${t.kurs_typen.price}</div>
        </div>
      `).join('')}
      ${_selTermin && termine.find(t => t.id === _selTermin.id)
        ? kalBuchungsFormular()
        : `<p class="kal-form-tipp">↑ Kurs auswählen zum Buchen</p>`}
    </div>`;
}

function kalBuchungsFormular() {
  return `
    <form class="kal-buchform" id="buchform" onsubmit="kalBuchungSenden(event)">
      <div class="kal-buchform-titel">Platz reservieren</div>
      <div class="kal-form-zwei">
        <input class="form-field" id="b-name"  type="text"  placeholder="Dein Name *"         required autocomplete="name">
        <input class="form-field" id="b-email" type="email" placeholder="E-Mail-Adresse *"     required autocomplete="email">
      </div>
      <input class="form-field" id="b-tel" type="tel" placeholder="Telefon (optional)" autocomplete="tel">
      <textarea class="form-field" id="b-msg" placeholder="Nachricht (optional)" rows="3"></textarea>
      <button type="submit" class="btn btn-primary" id="b-submit" style="width:fit-content">Jetzt buchen →</button>
      <p class="kal-kleingedruckt">* Pflichtfelder · Du erhältst eine Bestätigung per E-Mail.</p>
    </form>`;
}

// ─── Buchung absenden ──────────────────────────────────────

// ─── Modus-Umschalter ──────────────────────────────────────

function setModus(modus) {
  _modus = modus;
  _filterKurstyp = null;
  _selDatum = null; _selTermin = null;
  _verleihStart = null; _verleihEnde = null;

  document.querySelectorAll('.kal-toggle-btn').forEach(b => b.classList.remove('aktiv'));
  const btn = document.getElementById('toggle-' + modus);
  if (btn) btn.classList.add('aktiv');

  const sub = document.getElementById('kal-wrapper-sub');
  if (sub) sub.textContent = modus === 'kurse'
    ? 'Wähle einen grün markierten Tag im Kalender'
    : 'Wähle Start- und Enddatum der Miete (mind. 2 Wochen)';

  renderKalender();
}

// Vom Kurs-Klick auf der Homepage: Kalender mit diesem Kurstyp vorfiltern
function zeigeKursImKalender(kurstypId) {
  _filterKurstyp = kurstypId;
  _modus = 'kurse';
  _selDatum = null; _selTermin = null;

  // Nächsten freien Termin für diesen Kurstyp finden
  const naechster = _termine.find(t => t.kurs_typen?.id === kurstypId && t.status === 'offen');
  if (naechster) {
    const [year, month] = naechster.datum.split('-').map(Number);
    _kalMonat = new Date(year, month - 1, 1);
    _selDatum = naechster.datum;
    _selTermin = naechster;
  }

  document.querySelectorAll('.kal-toggle-btn').forEach(b => b.classList.remove('aktiv'));
  document.getElementById('toggle-kurse')?.classList.add('aktiv');
  document.querySelector('.kal-wrapper')?.scrollIntoView({ behavior: 'smooth' });
  renderKalender();
}

function clearKursFilter() {
  _filterKurstyp = null;
  _selDatum = null; _selTermin = null;
  renderKalender();
}

// ─── Verleih: Panel-Inhalte ────────────────────────────────

function verleihPanel() {
  if (!_verleihStart) {
    return `<div class="kal-platzhalter">
      <div class="kal-platzhalter-icon">🔄</div>
      <p>Wähle den <strong>ersten Tag</strong> der Miete im Kalender.<br>
      <small style="font-size:0.78rem">Mindestmietdauer: 2 Wochen</small></p>
    </div>`;
  }

  const startObj = new Date(_verleihStart + 'T00:00:00');
  const startStr = startObj.toLocaleDateString('de-DE', { day: 'numeric', month: 'long' });
  const minEndeObj = new Date(startObj.getTime() + 14 * 86400000);
  const minEndeStr = minEndeObj.toLocaleDateString('de-DE', { day: 'numeric', month: 'long' });

  if (!_verleihEnde) {
    return `<div class="kal-platzhalter">
      <div class="kal-platzhalter-icon">📅</div>
      <p>Start: <strong>${startStr}</strong><br>
      Wähle jetzt den <strong>letzten Tag</strong>.<br>
      <small style="font-size:0.78rem">Frühestens: ${minEndeStr}</small></p>
      <button class="btn btn-ghost" style="margin-top:1rem;font-size:0.78rem;padding:0.5rem 1rem"
              onclick="_verleihStart=null;renderKalender()">↩ Zurücksetzen</button>
    </div>`;
  }

  // Beide Daten gewählt → Zusammenfassung + Formular
  const endeObj  = new Date(_verleihEnde + 'T00:00:00');
  const endeStr  = endeObj.toLocaleDateString('de-DE', { day: 'numeric', month: 'long', year: 'numeric' });
  const tage     = Math.round((endeObj - startObj) / 86400000);
  const wochen   = Math.floor(tage / 7);
  const rest     = tage % 7;
  const dauerStr = `${wochen} Woche${wochen !== 1 ? 'n' : ''}${rest ? ` ${rest} Tag${rest !== 1 ? 'e' : ''}` : ''}`;

  return `<div>
    <div class="kal-panel-datum">Töpferscheibe leihen</div>
    <div class="kal-verleih-zusammenfassung">
      <span>🗓 Von: <strong>${startStr}</strong></span>
      <span>🗓 Bis: <strong>${endeStr}</strong></span>
      <span class="kal-verleih-dauer">⏱ ${dauerStr} (${tage} Tage)</span>
    </div>
    <form class="kal-buchform" id="verleihform" onsubmit="verleihBuchungSenden(event)">
      <div class="kal-buchform-titel">Anfrage stellen</div>
      <div class="kal-form-zwei">
        <input class="form-field" id="vb-name"  type="text"  placeholder="Dein Name *"     required autocomplete="name">
        <input class="form-field" id="vb-email" type="email" placeholder="E-Mail *"         required autocomplete="email">
      </div>
      <input class="form-field" id="vb-tel" type="tel" placeholder="Telefon (optional)" autocomplete="tel">
      <textarea class="form-field" id="vb-msg" placeholder="Nachricht / Fragen (optional)" rows="3"></textarea>
      <div style="display:flex;gap:0.7rem;align-items:center;flex-wrap:wrap">
        <button type="submit" class="btn btn-primary" id="vb-submit" style="width:fit-content">Jetzt anfragen →</button>
        <button type="button" class="btn btn-ghost" style="font-size:0.78rem;padding:0.5rem 1rem"
                onclick="_verleihStart=null;_verleihEnde=null;renderKalender()">↩ Zurück</button>
      </div>
      <p class="kal-kleingedruckt">* Pflichtfelder · Ich melde mich per E-Mail zur Bestätigung.</p>
    </form>
  </div>`;
}

// ─── Verleih: Klick-Logik ──────────────────────────────────

function verleihKlick(datum) {
  if (!_verleihStart) {
    _verleihStart = datum;
    _verleihEnde  = null;
  } else if (!_verleihEnde) {
    const tage = Math.round(
      (new Date(datum + 'T00:00:00') - new Date(_verleihStart + 'T00:00:00')) / 86400000
    );
    if (tage < 14) return; // Zu kurz — visuell schon gesperrt, trotzdem sicher abfangen

    // Überschneidung prüfen
    const overlap = _verleihBuchungen.some(b =>
      !(datum < b.start_datum || _verleihStart > b.end_datum)
    );
    if (overlap) {
      alert('Dieser Zeitraum überschneidet sich mit einer bestehenden Buchung.');
      return;
    }
    _verleihEnde = datum;
  } else {
    // Drittes Mal klicken → von vorne beginnen
    _verleihStart = datum;
    _verleihEnde  = null;
  }
  renderKalender();
}

// ─── Verleih: Buchung absenden ─────────────────────────────

async function verleihBuchungSenden(e) {
  e.preventDefault();
  if (!_verleihStart || !_verleihEnde || !_sb) return;

  const btn = document.getElementById('vb-submit');
  btn.textContent = 'Wird gesendet …';
  btn.disabled = true;

  const { error } = await _sb.from('verleih_buchungen').insert({
    start_datum: _verleihStart,
    end_datum:   _verleihEnde,
    name:        document.getElementById('vb-name').value.trim(),
    email:       document.getElementById('vb-email').value.trim(),
    telefon:     document.getElementById('vb-tel').value.trim()  || null,
    nachricht:   document.getElementById('vb-msg').value.trim()  || null
  });

  if (error) {
    btn.textContent = 'Fehler – bitte versuche es erneut.';
    btn.style.background = 'var(--terracotta)';
    setTimeout(() => { btn.textContent = 'Jetzt anfragen →'; btn.disabled = false; btn.style.background = ''; }, 3500);
  } else {
    const name  = document.getElementById('vb-name').value.trim();
    const email = document.getElementById('vb-email').value.trim();
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    document.getElementById('kal-panel').innerHTML = `
      <div class="kal-erfolg">
        <div class="kal-erfolg-haken">✓</div>
        <h3>Anfrage eingegangen!</h3>
        <p>Danke, <strong>${esc(name)}</strong>! Ich melde mich per E-Mail an <strong>${esc(email)}</strong>.</p>
        <button class="btn btn-ghost" onclick="_verleihStart=null;_verleihEnde=null;ladeUndRenderKalender()"
                style="margin-top:1.2rem">Neue Anfrage stellen</button>
      </div>`;
    _verleihStart = null; _verleihEnde = null;
    ladeVerleihBuchungen();
  }
}

async function kalBuchungSenden(e) {
  e.preventDefault();
  if (!_selTermin || !_sb) return;

  const btn = document.getElementById('b-submit');
  btn.textContent = 'Wird gesendet …';
  btn.disabled = true;

  const { data, error } = await _sb.rpc('create_buchung', {
    p_termin_id: _selTermin.id,
    p_name:      document.getElementById('b-name').value.trim(),
    p_email:     document.getElementById('b-email').value.trim(),
    p_telefon:   document.getElementById('b-tel').value.trim()  || null,
    p_nachricht: document.getElementById('b-msg').value.trim()  || null
  });

  if (error) {
    const msg = error.message.includes('ausgebucht')
      ? 'Leider ist dieser Termin inzwischen ausgebucht.'
      : 'Etwas ist schiefgelaufen — bitte versuche es erneut.';
    btn.textContent = msg;
    btn.style.background = 'var(--terracotta)';
    setTimeout(() => {
      btn.textContent = 'Jetzt buchen →';
      btn.disabled = false;
      btn.style.background = '';
    }, 3500);
  } else {
    const name  = document.getElementById('b-name').value.trim();
    const datumStr = new Date(_selDatum + 'T00:00:00')
      .toLocaleDateString('de-DE', { day: 'numeric', month: 'long' });
    const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    // Termin optimistisch lokal als gebucht markieren (Kalender-Dots sofort aktualisieren)
    const idx = _termine.findIndex(t => t.id === _selTermin.id);
    if (idx !== -1) {
      _termine[idx] = { ..._termine[idx], buchungen_count: (_termine[idx].buchungen_count || 0) + 1 };
      if (_termine[idx].buchungen_count >= _termine[idx].max_teilnehmer) {
        _termine[idx].status = 'voll';
      }
    }

    // Kalender neu rendern (zeigt aktualisierte Dots) – Panel danach überschreiben
    _selDatum = null;
    _selTermin = null;
    renderKalender();

    // Erfolgsmeldung ins Panel setzen (überschreibt den leeren Platzhalter)
    document.getElementById('kal-panel').innerHTML = `
      <div class="kal-erfolg">
        <div class="kal-erfolg-haken">✓</div>
        <h3>Buchung eingegangen!</h3>
        <p>Vielen Dank, <strong>${esc(name)}</strong>! Deine Anfrage für den <strong>${datumStr}</strong> ist eingegangen.</p>
        <p>Ich melde mich per Mail oder Telefon bei dir!</p>
        <button class="btn btn-ghost" onclick="_selDatum=null;_selTermin=null;ladeUndRenderKalender()"
                style="margin-top:1.2rem">Weiteren Termin buchen</button>
      </div>`;

    ladeKursTermine(); // DB still im Hintergrund aktualisieren
  }
}

/* ═══════════════════════════════════════════════════════
   KONTAKTFORMULAR (Formspree)
   ═══════════════════════════════════════════════════════ */

async function kontaktAbsenden(event) {
  event.preventDefault();

  const formcarryId = (siteData.kontakt.formcarryId || '').trim();
  const meldung = document.getElementById('kontakt-meldung');
  const btn = document.getElementById('kontakt-btn');
  const form = document.getElementById('kontakt-formular');

  // Noch keine Formcarry-ID? Hinweis anzeigen.
  if (!formcarryId) {
    meldung.style.display = 'block';
    meldung.style.background = '#fff8e1';
    meldung.style.color = '#92400e';
    meldung.style.border = '1px solid #f59e0b';
    meldung.innerHTML = '⚠️ Das Kontaktformular ist noch nicht eingerichtet. Bitte im Admin-Bereich unter <strong>Texte → Kontaktformular</strong> eine Formcarry-ID eintragen.';
    return;
  }

  // Absenden an Formcarry (EU-Server, DSGVO-konform)
  btn.disabled = true;
  btn.textContent = 'Wird gesendet …';

  const daten = new FormData(form);
  try {
    const antwort = await fetch('https://formcarry.com/s/' + formcarryId, {
      method: 'POST',
      body: daten,
      headers: { 'Accept': 'application/json' }
    });

    const json = await antwort.json().catch(() => ({}));
    console.log('[Formcarry] Status:', antwort.status, 'Response:', json);

    if (antwort.ok && json.code !== 400) {
      meldung.style.display = 'block';
      meldung.style.background = '#f0fdf4';
      meldung.style.color = '#166534';
      meldung.style.border = '1px solid #86efac';
      meldung.textContent = '✓ Danke für deine Nachricht! Ich melde mich so schnell wie möglich.';
      form.reset();
    } else {
      const fehlerText = json.message || json.title || ('HTTP ' + antwort.status);
      throw new Error(fehlerText);
    }
  } catch (e) {
    console.error('[Formcarry] Fehler:', e.message);
    meldung.style.display = 'block';
    meldung.style.background = '#fef2f2';
    meldung.style.color = '#991b1b';
    meldung.style.border = '1px solid #fca5a5';
    meldung.textContent = '✗ Fehler: ' + e.message + ' — Bitte sende deine Nachricht direkt per E-Mail.';
  }

  btn.disabled = false;
  btn.textContent = 'Nachricht senden →';
}
</script>
