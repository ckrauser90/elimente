<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elimente – Keramik · Kurse · Verleih</title>
<meta name="description" content="Elimente – Handgemachte Keramik, Töpferkurse und Töpferscheiben-Verleih">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Karla:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* ═══════════════════════════════════════════
   ELIMENTE – Töpferei Website
   
   FARBEN ÄNDERN? Ändere die Werte unter :root
   INHALTE ÄNDERN? Scroll runter zum <script> Tag 
   und ändere die Texte im "siteData" Objekt.
   ═══════════════════════════════════════════ */

:root {
  /* Hauptfarben – hier anpassen! */
  --sage: #7A8E6E;
  --sage-light: #95A888;
  --sage-pale: #B5C4AB;
  --sage-muted: #C8D4BF;
  --cream: #F6F2EC;
  --cream-warm: #EDE7DD;
  --cream-dark: #DDD5C8;
  --linen: #FAF8F5;
  --bark: #3E3832;
  --bark-light: #5D554E;
  --bark-muted: #7A726B;
  --terracotta: #B87A5A;
  --terracotta-light: #D4A07C;
  --moss: #5C6E52;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Karla', sans-serif;
  background: var(--linen);
  color: var(--bark);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

::selection {
  background: var(--sage-muted);
  color: var(--bark);
}

/* ─── GRAIN TEXTURE OVERLAY ─── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 9999;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}

/* ─── TYPOGRAPHY ─── */
h1, h2, h3, h4 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 500;
  letter-spacing: -0.01em;
}

/* ─── NAV ─── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 5vw;
  background: rgba(246,242,236,0.88);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  transition: all 0.4s ease;
}
nav.scrolled {
  padding: 0.8rem 5vw;
  box-shadow: 0 1px 0 rgba(122,142,110,0.12);
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 600;
  color: var(--bark);
  letter-spacing: 0.06em;
  text-transform: lowercase;
}
.logo-dot {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--sage);
  border-radius: 50%;
  margin-left: 2px;
  vertical-align: middle;
  transform: translateY(-2px);
}

.nav-links {
  display: flex; gap: 2.2rem;
  list-style: none;
}
.nav-links a {
  text-decoration: none;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--bark-muted);
  transition: color 0.3s;
}
.nav-links a:hover { color: var(--sage); }

.hamburger {
  display: none;
  background: none; border: none; cursor: pointer;
  width: 28px; height: 20px;
  position: relative;
}
.hamburger span {
  position: absolute; left: 0;
  width: 100%; height: 1.5px;
  background: var(--bark);
  transition: all 0.3s;
}
.hamburger span:nth-child(1) { top: 0; }
.hamburger span:nth-child(2) { top: 50%; transform: translateY(-50%); }
.hamburger span:nth-child(3) { bottom: 0; }

/* ─── HERO ─── */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: 0 5vw;
  gap: 4rem;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -20%; right: -10%;
  width: 70vw; height: 70vw;
  border-radius: 50%;
  background: radial-gradient(circle, var(--sage-muted) 0%, transparent 70%);
  opacity: 0.15;
  pointer-events: none;
}

.hero-text {
  padding-top: 5rem;
  max-width: 560px;
  animation: slideUp 0.9s ease-out;
}

.hero-label {
  display: inline-flex; align-items: center; gap: 0.6rem;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--sage);
  margin-bottom: 1.8rem;
}
.hero-label::before {
  content: '';
  width: 28px; height: 1.5px;
  background: var(--sage-pale);
}

.hero h1 {
  font-size: clamp(3rem, 5.5vw, 4.8rem);
  line-height: 1.08;
  color: var(--bark);
  margin-bottom: 1.4rem;
}
.hero h1 .accent {
  color: var(--sage);
  font-style: italic;
  font-weight: 400;
}

.hero-desc {
  font-size: 1.08rem;
  line-height: 1.75;
  color: var(--bark-muted);
  max-width: 420px;
  margin-bottom: 2.2rem;
}

.hero-actions { display: flex; gap: 1rem; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.85rem 1.8rem;
  font-family: 'Karla', sans-serif;
  font-size: 0.88rem; font-weight: 600;
  letter-spacing: 0.04em;
  text-decoration: none;
  border: none; cursor: pointer;
  transition: all 0.35s ease;
}
.btn-primary {
  background: var(--sage);
  color: #fff;
  border-radius: 4px;
  box-shadow: 0 2px 12px rgba(122,142,110,0.25);
}
.btn-primary:hover {
  background: var(--moss);
  box-shadow: 0 4px 20px rgba(122,142,110,0.35);
  transform: translateY(-1px);
}
.btn-ghost {
  background: none;
  color: var(--bark-light);
  padding: 0.85rem 0.5rem;
  border-bottom: 1.5px solid var(--cream-dark);
}
.btn-ghost:hover {
  color: var(--sage);
  border-color: var(--sage-pale);
}

/* Hero visual */
.hero-visual {
  display: flex;
  justify-content: center;
  align-items: center;
  padding-top: 5rem;
  animation: fadeIn 1.2s ease-out 0.3s both;
}

.hero-organic {
  width: 380px; height: 460px;
  position: relative;
}

.organic-shape {
  position: absolute;
  border-radius: 50%;
}
.organic-shape-1 {
  width: 320px; height: 380px;
  top: 20px; left: 30px;
  background: linear-gradient(160deg, var(--sage-pale) 0%, var(--sage) 60%, var(--moss) 100%);
  border-radius: 52% 48% 43% 57% / 55% 45% 55% 45%;
  animation: organicFloat 10s ease-in-out infinite;
  box-shadow:
    inset -15px -20px 40px rgba(92,110,82,0.25),
    inset 10px 15px 30px rgba(181,196,171,0.3),
    0 20px 50px rgba(122,142,110,0.15);
}
.organic-shape-2 {
  width: 160px; height: 180px;
  bottom: 0; left: 0;
  background: linear-gradient(135deg, var(--cream-warm) 0%, var(--terracotta-light) 100%);
  border-radius: 48% 52% 55% 45% / 50% 55% 45% 50%;
  animation: organicFloat 8s ease-in-out infinite reverse;
  opacity: 0.7;
  box-shadow: 0 10px 30px rgba(184,122,90,0.12);
}
.organic-shape-3 {
  width: 90px; height: 90px;
  top: 0; right: 20px;
  background: var(--cream-dark);
  border-radius: 45% 55% 50% 50% / 55% 45% 50% 50%;
  animation: organicFloat 7s ease-in-out infinite 1s;
  opacity: 0.5;
}

.hero-emoji {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 5rem;
  filter: drop-shadow(0 8px 16px rgba(0,0,0,0.1));
  z-index: 2;
}

@keyframes organicFloat {
  0%, 100% { border-radius: 52% 48% 43% 57% / 55% 45% 55% 45%; transform: translate(0, 0); }
  33% { border-radius: 48% 52% 50% 50% / 45% 55% 50% 50%; transform: translate(-5px, 8px); }
  66% { border-radius: 55% 45% 48% 52% / 50% 50% 55% 45%; transform: translate(5px, -5px); }
}

/* ─── SECTION SHARED ─── */
section {
  padding: 7rem 5vw;
}

.section-intro {
  max-width: 560px;
  margin-bottom: 4rem;
}
.section-intro.centered {
  text-align: center;
  margin-left: auto; margin-right: auto;
}

.section-label {
  display: inline-flex; align-items: center; gap: 0.6rem;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--sage);
  margin-bottom: 1rem;
}
.section-label::before {
  content: '';
  width: 20px; height: 1.5px;
  background: var(--sage-pale);
}

.section-intro h2 {
  font-size: clamp(2rem, 3.5vw, 2.8rem);
  line-height: 1.15;
  color: var(--bark);
  margin-bottom: 1rem;
}

.section-intro p {
  font-size: 1rem;
  line-height: 1.7;
  color: var(--bark-muted);
}

/* ─── ÜBER UNS ─── */
#ueber {
  background: var(--cream);
}

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 5rem;
  max-width: 1060px;
  margin: 0 auto;
  align-items: center;
}

.about-visual {
  position: relative;
  height: 400px;
}
.about-blob {
  width: 100%; height: 100%;
  background: linear-gradient(145deg, var(--sage-muted), var(--sage-pale));
  border-radius: 60% 40% 50% 50% / 50% 60% 40% 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 5rem;
  box-shadow: 0 20px 50px rgba(122,142,110,0.12);
}

.about-text blockquote {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-style: italic;
  line-height: 1.5;
  color: var(--bark-light);
  border-left: 2px solid var(--sage-pale);
  padding-left: 1.5rem;
  margin-bottom: 1.5rem;
}

.about-text p {
  font-size: 0.95rem;
  line-height: 1.8;
  color: var(--bark-muted);
  margin-bottom: 1rem;
}

/* ─── ANGEBOTE CARDS ─── */
#angebote { background: var(--linen); }

.offer-cards {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.5rem;
  max-width: 1060px;
  margin: 0 auto;
}

.offer-card {
  background: var(--cream);
  border: 1px solid rgba(122,142,110,0.08);
  border-radius: 12px;
  padding: 2.5rem 2rem;
  position: relative;
  transition: all 0.4s ease;
  overflow: hidden;
}
.offer-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--sage-pale), var(--sage));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s ease;
}
.offer-card:hover::before { transform: scaleX(1); }
.offer-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(62,56,50,0.07);
}

.offer-emoji {
  font-size: 2rem;
  margin-bottom: 1.2rem;
  display: block;
}

.offer-card h3 {
  font-size: 1.4rem;
  margin-bottom: 0.7rem;
  color: var(--bark);
}
.offer-card p {
  font-size: 0.9rem;
  line-height: 1.7;
  color: var(--bark-muted);
  margin-bottom: 1.2rem;
}

.card-link {
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--sage);
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  transition: gap 0.3s;
}
.card-link:hover { gap: 0.8rem; }

/* ─── KURSE ─── */
#kurse { background: var(--cream); }

.kurs-list {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 1.5rem;
  max-width: 1060px;
  margin: 0 auto;
}

.kurs-item {
  background: var(--linen);
  border-radius: 10px;
  padding: 2rem;
  border: 1px solid transparent;
  transition: all 0.35s ease;
}
.kurs-item:hover {
  border-color: var(--sage-pale);
  box-shadow: 0 8px 28px rgba(62,56,50,0.06);
}

.kurs-tags {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  margin-bottom: 1rem;
}
.tag {
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0.3rem 0.65rem;
  border-radius: 3px;
}
.tag-level { background: rgba(122,142,110,0.14); color: var(--sage); }
.tag-advanced { background: rgba(184,122,90,0.12); color: var(--terracotta); }
.tag-date { background: rgba(62,56,50,0.06); color: var(--bark-muted); }

.kurs-item h3 {
  font-size: 1.25rem;
  margin-bottom: 0.5rem;
  color: var(--bark);
}
.kurs-item > p {
  font-size: 0.88rem;
  line-height: 1.65;
  color: var(--bark-muted);
}
.kurs-price {
  margin-top: 1.2rem;
  padding-top: 1rem;
  border-top: 1px solid var(--cream-dark);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--moss);
}
.kurs-price small {
  font-size: 0.8rem;
  font-weight: 400;
  color: var(--bark-muted);
}

/* ─── GALERIE ─── */
#galerie { background: var(--linen); }

.gallery-masonry {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 180px;
  gap: 0.8rem;
  max-width: 1060px;
  margin: 0 auto;
}

.gallery-cell {
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  transition: transform 0.35s, box-shadow 0.35s;
}
.gallery-cell:hover {
  transform: scale(1.02);
  box-shadow: 0 12px 30px rgba(62,56,50,0.1);
  z-index: 2;
}

.gallery-cell:nth-child(1) { grid-column: span 2; grid-row: span 2; font-size: 4rem; background: linear-gradient(150deg, var(--sage-pale), var(--sage)); }
.gallery-cell:nth-child(2) { background: linear-gradient(135deg, var(--cream-warm), var(--terracotta-light)); }
.gallery-cell:nth-child(3) { background: linear-gradient(135deg, var(--sage-muted), var(--sage-pale)); }
.gallery-cell:nth-child(4) { grid-row: span 2; background: linear-gradient(180deg, var(--cream-dark), var(--sage-pale)); font-size: 3rem; }
.gallery-cell:nth-child(5) { background: linear-gradient(135deg, var(--terracotta-light), var(--terracotta)); }
.gallery-cell:nth-child(6) { background: linear-gradient(135deg, var(--sage), var(--moss)); }

.gallery-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 1rem;
  background: linear-gradient(transparent, rgba(62,56,50,0.6));
  color: #fff;
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  opacity: 0;
  transform: translateY(4px);
  transition: all 0.3s;
}
.gallery-cell:hover .gallery-label {
  opacity: 1;
  transform: translateY(0);
}

.gallery-hint {
  text-align: center;
  margin-top: 2rem;
  font-size: 0.85rem;
  color: var(--bark-muted);
  font-style: italic;
}

/* ─── VERLEIH ─── */
#verleih { background: var(--cream); }

.rental-card {
  max-width: 860px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 3rem;
  align-items: center;
  background: var(--linen);
  border-radius: 14px;
  padding: 3rem;
  border: 1px solid rgba(122,142,110,0.1);
}

.rental-visual {
  width: 150px; height: 150px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--sage-muted), var(--sage));
  display: flex; align-items: center; justify-content: center;
  font-size: 3.5rem;
  box-shadow:
    0 12px 32px rgba(122,142,110,0.18),
    inset 0 -4px 12px rgba(92,110,82,0.15);
  flex-shrink: 0;
}

.rental-body h3 {
  font-size: 1.6rem;
  margin-bottom: 0.6rem;
}
.rental-body > p {
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--bark-muted);
  margin-bottom: 1.5rem;
}

.rental-pricing {
  display: flex; gap: 2rem; flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.rental-price-item {
  display: flex; flex-direction: column;
}
.rental-price-item .amount {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--moss);
}
.rental-price-item .period {
  font-size: 0.78rem;
  color: var(--bark-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.rental-perks {
  display: flex; gap: 1.5rem; flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.perk {
  font-size: 0.85rem;
  color: var(--bark-light);
  display: flex; align-items: center; gap: 0.4rem;
}
.perk::before {
  content: '✓';
  color: var(--sage);
  font-weight: 700;
}

/* ─── KONTAKT ─── */
#kontakt { background: var(--linen); }

.contact-layout {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  gap: 4rem;
  max-width: 940px;
  margin: 0 auto;
}

.contact-details h3 {
  font-size: 1.4rem;
  margin-bottom: 2rem;
}

.contact-line {
  display: flex; align-items: flex-start; gap: 1rem;
  margin-bottom: 1.8rem;
}
.contact-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  background: var(--cream);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.contact-line .label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--bark-muted);
  margin-bottom: 0.15rem;
}
.contact-line .value {
  font-size: 0.95rem;
  color: var(--bark);
}

.form-stack {
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
}

.form-field {
  padding: 0.85rem 1.1rem;
  border: 1.5px solid var(--cream-dark);
  border-radius: 6px;
  font-family: 'Karla', sans-serif;
  font-size: 0.9rem;
  background: var(--cream);
  color: var(--bark);
  transition: border-color 0.3s, background 0.3s;
  outline: none;
}
.form-field:focus {
  border-color: var(--sage-pale);
  background: #fff;
}
.form-field::placeholder { color: var(--bark-muted); }
textarea.form-field { resize: vertical; min-height: 130px; }

/* ─── KALENDER BUCHUNG ─── */
.kal-wrapper {
  max-width: 1060px;
  margin: 3rem auto 0;
  background: var(--linen);
  border-radius: 14px;
  border: 1px solid rgba(122,142,110,0.1);
  padding: 2.5rem;
}
.kal-wrapper-titel {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  color: var(--bark);
  margin-bottom: 0.4rem;
}
.kal-wrapper-sub {
  font-size: 0.9rem;
  color: var(--bark-muted);
  margin-bottom: 2rem;
}

.kal-layout {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 2.5rem;
  align-items: start;
}

/* Linke Seite: Kalender-Grid */
.kal-nav {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  margin-bottom: 1rem;
}
.kal-nav-btn {
  background: none;
  border: 1px solid var(--cream-dark);
  border-radius: 6px;
  width: 30px; height: 30px;
  cursor: pointer;
  color: var(--bark-muted);
  font-size: 0.7rem;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.kal-nav-btn:hover {
  border-color: var(--sage-pale);
  color: var(--sage);
}
.kal-monatstitel {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--bark);
  min-width: 155px;
  text-align: center;
}
.kal-raster {

function initScrollEffects() {
  // Nav scroll
  const nav = document.getElementById('mainNav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 40);
  });

  // Reveal on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.reveal').forEach((el, i) => {
    el.style.transitionDelay = `${(i % 4) * 0.08}s`;
    observer.observe(el);
  });

  // Close mobile nav on link click
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.addEventListener('click', () => {
      document.getElementById('mainNav').classList.remove('mobile-open');
    });
  });
}

// Render!
renderSite(siteData);

/* ═══════════════════════════════════════════════════════
   KALENDER & BUCHUNGSSYSTEM
   ─────────────────────────────────────────────────────
   Dieser Block lädt Termine aus Supabase und zeigt
   einen buchbaren Kalender im Kurse-Bereich an.
   ═══════════════════════════════════════════════════════ */

// Zustand
let _sb        = null;   // Supabase-Client
let _termine   = [];     // Alle geladenen Kurstermine
let _selDatum  = null;   // Ausgewähltes Datum (YYYY-MM-DD)
let _selTermin = null;   // Ausgewählter Termin (Objekt)
let _kalMonat  = new Date(); _kalMonat.setDate(1); // Erster des aktuellen Monats

// Supabase initialisieren
(function initSupabase() {
  const cfg = siteData.supabase;
  if (!cfg || !cfg.url || cfg.url.startsWith('DEINE')) {
    // Noch nicht konfiguriert → freundliche Meldung
    const el = document.getElementById('kurs-kalender');
    if (el) el.innerHTML = '<p class="kal-fehler" style="color:var(--bark-muted);font-style:italic">Kalender wird nach der Supabase-Einrichtung aktiv.</p>';
    return;
  }
  _sb = window.supabase.createClient(cfg.url, cfg.anonKey);
  ladeUndRenderKalender();
})();

// Termine aus Supabase laden und Kalender rendern
async function ladeUndRenderKalender() {
  const el = document.getElementById('kurs-kalender');
  if (!el || !_sb) return;

  const heute = new Date().toISOString().split('T')[0];
  const { data, error } = await _sb
    .from('kurs_termine')
    .select('*, kurs_typen(*)')
    .gte('datum', heute)
    .neq('status', 'abgesagt')
    .order('datum');

  if (error) {
    el.innerHTML = '<p class="kal-fehler">Termine konnten nicht geladen werden.</p>';
    return;
  }
  _termine = data || [];
  renderKalender();
}

// ─── Kalender-Grid rendern ──────────────────────────────────
function renderKalender() {
  const el = document.getElementById('kurs-kalender');
  if (!el) return;

  const MONATE = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const TAGE   = ['Mo','Di','Mi','Do','Fr','Sa','So'];

  const year  = _kalMonat.getFullYear();
  const month = _kalMonat.getMonth();

  // Wochentag des ersten Monatstags (Mo=0 … So=6)
  let ersterTag = new Date(year, month, 1).getDay();
  ersterTag = ersterTag === 0 ? 6 : ersterTag - 1;

  const tageImMonat = new Date(year, month + 1, 0).getDate();
  const heute = new Date(); heute.setHours(0, 0, 0, 0);

  // Termine nach Tag gruppieren
  const tagMap = {};
  _termine.forEach(t => {
    const [ty, tm, td] = t.datum.split('-').map(Number);
    if (ty === year && tm - 1 === month) {
      (tagMap[td] = tagMap[td] || []).push(t);
    }
  });

  // Leere Zellen vor dem ersten Tag
  let cells = Array(ersterTag).fill('<div class="kal-cell kal-leer"></div>').join('');

  for (let tag = 1; tag <= tageImMonat; tag++) {
    const datum    = `${year}-${String(month + 1).padStart(2, '0')}-${String(tag).padStart(2, '0')}`;
    const datumObj = new Date(year, month, tag);
    const istHeute    = datumObj.getTime() === heute.getTime();
    const istVergangen= datumObj < heute;
    const termine     = tagMap[tag] || [];
    const hatFreie    = termine.some(t => t.status === 'offen');
    const hatVolle    = termine.some(t => t.status === 'voll') && !hatFreie;
    const istSelected = datum === _selDatum;

    let cls = 'kal-cell';
    if (istHeute)     cls += ' kal-heute';
    if (istVergangen) cls += ' kal-vergangen';
    if (termine.length && !istVergangen) cls += hatFreie ? ' kal-frei' : ' kal-voll';
    if (istSelected)  cls += ' kal-selected';

    const punkte = termine.length && !istVergangen
      ? termine.map(t => `<span class="kal-punkt${t.status === 'voll' ? ' kal-punkt-voll' : ''}"></span>`).join('')
      : '';

    const klick = hatFreie && !istVergangen ? `onclick="kalWaehleTag('${datum}')"` : '';

    cells += `<div class="${cls}" ${klick}><span class="kal-tagzahl">${tag}</span><div class="kal-punkte">${punkte}</div></div>`;
  }

  el.innerHTML = `
    <div class="kal-layout">
      <div>
        <div class="kal-nav">
          <button class="kal-nav-btn" onclick="kalNavMonat(-1)">◀</button>
          <span class="kal-monatstitel">${MONATE[month]} ${year}</span>
          <button class="kal-nav-btn" onclick="kalNavMonat(1)">▶</button>
        </div>
        <div class="kal-raster">
          ${TAGE.map(t => `<div class="kal-wochentag">${t}</div>`).join('')}
          ${cells}
        </div>
        <div class="kal-legende">
          <span><span class="kal-punkt"></span> Plätze frei</span>
          <span><span class="kal-punkt kal-punkt-voll"></span> Ausgebucht</span>
        </div>
      </div>
      <div class="kal-panel" id="kal-panel">
        ${_selDatum ? kalBuchungsPanel() : kalPlatzhalter()}
      </div>
    </div>
  `;
}

// ─── Hilfsfunktionen ───────────────────────────────────────

function kalNavMonat(dir) {
  _kalMonat.setMonth(_kalMonat.getMonth() + dir);
  renderKalender();
}

function kalWaehleTag(datum) {
  _selDatum  = datum;
  _selTermin = null;
  renderKalender();
}

function kalWaehleTermin(terminId) {
  _selTermin = _termine.find(t => t.id === terminId) || null;
  // Nur Panel neu rendern, nicht den ganzen Kalender
  const panel = document.getElementById('kal-panel');
  if (panel) panel.innerHTML = kalBuchungsPanel();
}

// ─── Panel-Inhalte ─────────────────────────────────────────

function kalPlatzhalter() {
  return `
    <div class="kal-platzhalter">
      <div class="kal-platzhalter-icon">📅</div>
      <p>Wähle einen <strong>grün markierten Tag</strong>, um einen Termin zu buchen.</p>
    </div>`;
}

function kalBuchungsPanel() {
  const termine = _termine.filter(t => t.datum === _selDatum && t.status === 'offen');
  const datumStr = new Date(_selDatum + 'T00:00:00')
    .toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long' });

  return `
    <div>
      <div class="kal-panel-datum">${datumStr}</div>
      ${termine.map(t => `
        <div class="kal-termin-karte${_selTermin?.id === t.id ? ' ist-aktiv' : ''}"
             onclick="kalWaehleTermin('${t.id}')">
          <div class="kal-termin-name">${t.kurs_typen.name}</div>
          <div class="kal-termin-meta">🕐 ${t.uhrzeit_start.slice(0, 5)} Uhr &nbsp;·&nbsp; ⏱ ${t.kurs_typen.duration} &nbsp;·&nbsp; 💰 ${t.kurs_typen.price}</div>
          <div class="kal-termin-plaetze">${t.max_teilnehmer - t.buchungen_count} / ${t.max_teilnehmer} Plätze frei</div>
        </div>
      `).join('')}
      ${_selTermin && termine.find(t => t.id === _selTermin.id)
        ? kalBuchungsFormular()
        : `<p class="kal-form-tipp">↑ Kurs auswählen zum Buchen</p>`}
    </div>`;
}

function kalBuchungsFormular() {
  return `
    <form class="kal-buchform" id="buchform" onsubmit="kalBuchungSenden(event)">
      <div class="kal-buchform-titel">Platz reservieren</div>
      <div class="kal-form-zwei">
        <input class="form-field" id="b-name"  type="text"  placeholder="Dein Name *"         required autocomplete="name">
        <input class="form-field" id="b-email" type="email" placeholder="E-Mail-Adresse *"     required autocomplete="email">
      </div>
      <input class="form-field" id="b-tel" type="tel" placeholder="Telefon (optional)" autocomplete="tel">
      <textarea class="form-field" id="b-msg" placeholder="Nachricht (optional)" rows="3"></textarea>
      <button type="submit" class="btn btn-primary" id="b-submit" style="width:fit-content">Jetzt buchen →</button>
      <p class="kal-kleingedruckt">* Pflichtfelder · Du erhältst eine Bestätigung per E-Mail.</p>
    </form>`;
}

// ─── Buchung absenden ──────────────────────────────────────

async function kalBuchungSenden(e) {
  e.preventDefault();
  if (!_selTermin || !_sb) return;

  const btn = document.getElementById('b-submit');
  btn.textContent = 'Wird gesendet …';
  btn.disabled = true;

  const { data, error } = await _sb.rpc('create_buchung', {
    p_termin_id: _selTermin.id,
    p_name:      document.getElementById('b-name').value.trim(),
    p_email:     document.getElementById('b-email').value.trim(),
    p_telefon:   document.getElementById('b-tel').value.trim()  || null,
    p_nachricht: document.getElementById('b-msg').value.trim()  || null
  });

  if (error) {
    const msg = error.message.includes('ausgebucht')
      ? 'Leider ist dieser Termin inzwischen ausgebucht.'
      : 'Etwas ist schiefgelaufen — bitte versuche es erneut.';
    btn.textContent = msg;
    btn.style.background = 'var(--terracotta)';
    setTimeout(() => {
      btn.textContent = 'Jetzt buchen →';
      btn.disabled = false;
      btn.style.background = '';
    }, 3500);
  } else {
    const name  = document.getElementById('b-name').value.trim();
    const email = document.getElementById('b-email').value.trim();
    const datumStr = new Date(_selDatum + 'T00:00:00')
      .toLocaleDateString('de-DE', { day: 'numeric', month: 'long' });

    document.getElementById('kal-panel').innerHTML = `
      <div class="kal-erfolg">
        <div class="kal-erfolg-haken">✓</div>
        <h3>Buchung eingegangen!</h3>
        <p>Danke, <strong>${name}</strong>! Deine Anfrage für den <strong>${datumStr}</strong> ist bei uns eingegangen.</p>
        <p>Wir melden uns per E-Mail an <strong>${email}</strong>.</p>
        <button class="btn btn-ghost" onclick="_selDatum=null;_selTermin=null;ladeUndRenderKalender()"
                style="margin-top:1.2rem">Weiteren Termin buchen</button>
      </div>`;

    _selTermin = null;
    await ladeUndRenderKalender(); // Termine neu laden (aktualisierter Zähler)
  }
}
</script>
