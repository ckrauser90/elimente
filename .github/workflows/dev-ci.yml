# ═══════════════════════════════════════════════════════════
# ELIMENTE – Dev Branch CI
#
# Läuft bei jedem Push auf "dev".
# Baut die Seite (mit echten Keys) und stellt sie als Artifact
# zum Download bereit → so kann die Seite vor dem Merge auf
# main lokal geprüft werden.
#
# Artifact herunterladen:
#   GitHub → Actions → letzter "Dev CI" Run → Artifacts → site-preview
#   ZIP entpacken → index.html im Browser öffnen
# ═══════════════════════════════════════════════════════════

name: Dev CI

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  build-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Supabase-Keys einfügen
        run: |
          for f in index.html admin.html impressum.html datenschutz.html agb.html; do
            sed -i "s|DEINE_SUPABASE_URL|${{ secrets.SUPABASE_URL }}|g" "$f"
            sed -i "s|DEIN_SUPABASE_ANON_KEY|${{ secrets.SUPABASE_KEY }}|g" "$f"
          done

      - name: Etsy Produkte laden
        env:
          ETSY_API_KEY: ${{ secrets.ETSY_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import urllib.request, json, os
          key = os.environ.get('ETSY_API_KEY', '')
          url = 'https://openapi.etsy.com/v3/application/shops/ELIMENTE/listings/active?limit=8&includes=Images'
          req = urllib.request.Request(url, headers={'x-api-key': key})
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  data = r.read().decode('utf-8')
              json.loads(data)
          except Exception as e:
              print(f'Etsy API Fehler (wird übersprungen): {e}')
              data = '{"results":[]}'
          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
          html = html.replace('"ETSY_LISTINGS_PLACEHOLDER"', data)
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          PYEOF

      - name: Dummy config.local.js erstellen
        run: echo "/* dev-preview – keys sind direkt im HTML */" > config.local.js

      - name: Einfacher HTML-Check (keine kaputten Platzhalter)
        run: |
          # Prüfen ob alle Supabase-Platzhalter ersetzt wurden
          if grep -r "DEINE_SUPABASE_URL\|DEIN_SUPABASE_ANON_KEY" *.html; then
            echo "❌ Fehler: Supabase-Platzhalter wurden nicht ersetzt!"
            echo "   Bitte SUPABASE_URL und SUPABASE_KEY in den GitHub Secrets prüfen."
            exit 1
          fi
          echo "✅ Alle Platzhalter ersetzt."

      - name: Site-Preview als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: site-preview
          # Alle relevanten Dateien einschließen
          path: |
            *.html
            *.css
            *.js
            *.png
            *.jpg
            *.jpeg
            *.svg
            *.ico
            bilder/**
          retention-days: 7
